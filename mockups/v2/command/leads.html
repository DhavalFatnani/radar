<!DOCTYPE html>
<html lang="en" data-theme="slate" data-mode="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Radar — Leads · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../assets/tokens.css" />
<link rel="stylesheet" href="../../assets/base.css" />
<link rel="stylesheet" href="../../assets/components.css" />
<link rel="stylesheet" href="../assets/v2.css" />
<link rel="stylesheet" href="../assets/command.css" />
<style>
  .lead-left { position: sticky; top: 112px; display: flex; flex-direction: column; gap: var(--space-3); align-self: start; }
  .lead-list { max-height: calc(100vh - 210px); overflow-y: auto; display: flex; flex-direction: column; gap: var(--space-2); padding-right: 2px; }
  .brief-head { display: flex; gap: var(--space-5); align-items: flex-start; padding-bottom: var(--space-5); border-bottom: var(--border-w) solid var(--border); }
  .brief-head .co h2 { font-size: var(--text-2xl); letter-spacing: -0.02em; }
  .brief-head .co .does { color: var(--text-muted); margin-top: var(--space-1); }
  .brief-head .co .meta { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-top: var(--space-3); font-size: var(--text-sm); align-items: center; }
  .brief-controls { display: flex; flex-direction: column; align-items: flex-end; gap: var(--space-3); flex: none; }
  .act-bar { display: flex; gap: var(--space-3); flex-wrap: wrap; margin-top: var(--space-5); padding-top: var(--space-5); border-top: var(--border-w) solid var(--border); }
  @media (max-width: 1080px) { .lead-left { position: static; } .lead-list { max-height: none; } .brief-head { flex-direction: column; } }
</style>
</head>
<body data-dir="command" data-screen="leads" data-title="Leads">
<div class="v2-app">
  <div class="v2-main">
    <main class="v2-content">
      <div class="cmd-split">
        <aside class="lead-left">
          <div class="cmd-zone-head"><span class="eyebrow" id="qcount">leads</span><span class="eyebrow">triage · score ↓</span></div>
          <div class="filters" id="filters"></div>
          <div class="lead-list" id="queue" role="listbox" aria-label="Lead triage queue"></div>
        </aside>
        <section class="cmd-inspector card card-pad reveal" id="detail" aria-live="polite"></section>
      </div>
    </main>
  </div>
</div>

<script src="../../assets/data.js"></script>
<script src="../../assets/ui.js"></script>
<script src="../assets/motion.js"></script>
<script src="../assets/wayfinding.js"></script>
<script src="../assets/nav.js"></script>
<script>
(function () {
  const R = window.RADAR;
  const vname = (id) => (R.vendors.find((v) => v.vendor_id === id) || {}).name || id;
  const vshort = (id) => (R.vendors.find((v) => v.vendor_id === id) || {}).short || "";
  let state = { vendor: "all", stage: "all", selected: null };
  const sorted = R.leads.slice().sort((a, b) => b.score - a.score);

  function show(l) { return (state.vendor === "all" || l.vendor_id === state.vendor) && (state.stage === "all" || l.stage === state.stage); }

  function renderFilters() {
    const vendors = [["all", "All"]].concat(R.vendors.map((v) => [v.vendor_id, v.short]));
    const stages = [["all", "All"]].concat(["sourced","contacted","engaged","pitched","won"].map((s)=>[s,s]));
    const seg = (label, opts, key) => `<span class="fchip-label">${label}</span>` +
      opts.map(([val,txt]) => `<button class="fchip" data-k="${key}" data-v="${val}" aria-pressed="${state[key]===val}">${txt}</button>`).join("");
    document.getElementById("filters").innerHTML =
      `<div class="filters" style="margin-bottom:var(--space-2)">${seg("Vendor",vendors,"vendor")}</div><div class="filters">${seg("Stage",stages,"stage")}</div>`;
    document.querySelectorAll("[data-k]").forEach((b)=>b.addEventListener("click",()=>{ state[b.dataset.k]=b.dataset.v; applyFilter(); }));
  }

  function rowHTML(l) {
    return `<button class="cmd-row" role="option" data-lead="${l.lead_id}" aria-selected="${l.lead_id===state.selected}">
      <div><div class="co">${l.company}</div><div class="sub">${l.does} · ${l.geo}</div>
        <div class="tags"><span class="vendor">${vshort(l.vendor_id)}</span><span class="stage" data-stage="${l.stage}"><span>${l.stage}</span></span></div></div>
      <div class="right"><span class="score-pill" data-heat="${l.heat}">${l.score}</span><span class="next-cue">open <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span></div>
    </button>`;
  }

  function renderQueue() {
    document.getElementById("queue").innerHTML = sorted.map(rowHTML).join("");
    document.querySelectorAll(".cmd-row").forEach((row)=>row.addEventListener("click",()=>{ state.selected=row.dataset.lead; markSel(); renderDetail(); }));
    applyFilter(true);
  }
  function applyFilter(initial) {
    const queue = document.getElementById("queue");
    const doToggle = () => {
      let n = 0;
      sorted.forEach((l) => { const el = queue.querySelector(`[data-lead="${l.lead_id}"]`); const vis = show(l); el.style.display = vis ? "" : "none"; if (vis) n++; });
      document.getElementById("qcount").textContent = `${n} lead${n!==1?"s":""}`;
    };
    if (initial || !window.radarMotion) doToggle(); else window.radarMotion.flip(queue, doToggle);
    if (!sorted.find((l)=>l.lead_id===state.selected && show(l))) { const f = sorted.find(show); state.selected = f ? f.lead_id : null; }
    markSel(); renderDetail();
  }
  function markSel() { document.querySelectorAll(".cmd-row").forEach((r)=>r.setAttribute("aria-selected", String(r.dataset.lead===state.selected))); }

  function proofLine(p) {
    const sig = R.signalById(p.sig) || {}; const v = R.freshness(p.date, sig.freshness_window || 180);
    return `<div class="proof"><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg></span>
      <div><div class="claim">${p.claim}</div><div class="receipt" data-fresh="${v}"><span class="mono">${R.fmtDate(p.date)}</span><span class="dot">·</span><span class="ago">${R.ago(p.date)}</span><span class="dot">·</span><span class="src">${p.source}</span><span class="dot">·</span><span class="mono faint">${p.sig}</span>${p.evidence?`<span class="dot">·</span><a href="${p.evidence}">evidence</a>`:""}</div></div></div>`;
  }
  function contacts(l) {
    if (!l.contacts || !l.contacts.length) return `<div class="empty" style="padding:var(--space-6)"><h3>Contacts pending enrichment</h3><p>Decision-makers haven't been resolved yet.</p></div>`;
    return l.contacts.map((dm)=>{ const w=dm.warm||{status:"cold"};
      const paths=dm.paths.map((p)=>!p.val?`<div class="path missing"><span class="type">${p.type}</span><span class="val">not found</span><span class="needs">needs enrichment</span></div>`:`<div class="path"><span class="type">${p.type}</span><span class="val">${p.val}</span><span class="conf">${p.conf}${p.source?" · "+p.source:""}</span></div>`).join("");
      const warm=w.status==="warm"?`<div class="warm-path"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.35-9.5-8.5A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6.5C19 16.65 12 21 12 21z"/></svg> Warm path · ${w.detail}</div>`:`<div class="warm-path cold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.35-9.5-8.5A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6.5C19 16.65 12 21 12 21z"/></svg> No warm path yet — cold outreach</div>`;
      return `<div class="dm"><div class="dm-head"><span class="dm-name">${dm.name}</span><span class="dm-role">${dm.role}</span></div><div class="why">${dm.why}</div><div class="paths">${paths}</div>${warm}</div>`;
    }).join("");
  }
  function renderDetail() {
    const l = sorted.find((x)=>x.lead_id===state.selected) || sorted.find(show);
    const detail = document.getElementById("detail");
    if (!l) { detail.innerHTML = `<div class="empty"><h3>No leads match</h3><p>Loosen the filters.</p></div>`; return; }
    const on = l.outreach === "handed_to_vendor";
    detail.innerHTML = `
      <div class="brief-head">
        <div class="co" style="flex:1">
          <div class="mono faint" style="font-size:var(--text-2xs)">${l.lead_id}</div>
          <h2>${l.company}</h2><div class="does">${l.does} · ${l.geo}</div>
          <div class="meta"><span>for <b>${vname(l.vendor_id)}</b></span><span class="faint">·</span><span class="stage" data-stage="${l.stage}"><span>${l.stage}</span></span><span class="faint">·</span>
            <span class="check-pass" style="font-size:var(--text-xs)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> disqualifier check passed</span></div>
        </div>
        <div class="brief-controls">
          <span class="score" data-heat="${l.heat}" data-score="${l.score}"><span class="ring"><span data-count="${l.score}">0</span></span><span class="col"><span class="num count" data-count="${l.score}">0</span><span class="heat-label">${l.heat}</span></span></span>
          <div class="toggle" role="switch" aria-checked="${on}" tabindex="0" data-toggle data-on="Handed to vendor" data-off="Operator handles" data-toast-on="Outreach handed to vendor" data-toast-off="Operator handles outreach"><span class="switch"></span><span class="labels"><span class="state">${on?"Handed to vendor":"Operator handles"}</span><span class="desc">outreach mode</span></span></div>
        </div>
      </div>
      <div class="brief-body">
        <div class="brief-block reveal"><h3>Why them</h3><p>${l.why_them||l.intent}</p></div>
        <div class="brief-block reveal"><h3>Why now <span class="eyebrow" style="font-weight:400">dated, sourced proof</span></h3>${(l.why_now||[]).map(proofLine).join("")}</div>
        ${l.what_they_need?`<div class="brief-block reveal"><h3>What they need</h3><p>${l.what_they_need}</p></div>`:""}
        ${l.hook?`<div class="brief-block reveal"><h3>The hook <span class="draft-flag">suggested draft</span></h3><div class="hook">${l.hook}</div></div>`:""}
        ${l.why_this_vendor?`<div class="brief-block reveal"><h3>Why this vendor</h3><p>${l.why_this_vendor}</p></div>`:""}
        ${(l.objections&&l.objections.length)?`<div class="brief-block reveal"><h3>What to watch for</h3>${l.objections.map((o)=>`<div class="objection"><div class="o">${o.o}</div><div class="c">${o.c}</div></div>`).join("")}</div>`:""}
        <div class="brief-block reveal"><h3>Contacts</h3>${contacts(l)}</div>
        <div class="act-bar"><button class="btn btn-primary" id="advance">Advance stage →</button><button class="btn btn-ghost">Open in pipeline</button><button class="btn btn-ghost">Copy brief</button></div>
      </div>`;
    if (window.radarPaintScores) radarPaintScores(detail);
    if (window.radarWire) radarWire(detail);
    if (window.radarMotion) { radarMotion.wireReveals(detail); radarMotion.countUp(detail); }
    const adv = document.getElementById("advance");
    if (adv) adv.addEventListener("click", () => { const o=R.stages, i=o.indexOf(l.stage); if(i<0||i>=4){radarToast("Past triage stages");return;} l.stage=o[i+1]; radarToast(`Advanced to ${l.stage}`); renderQueue(); });
  }

  renderFilters(); renderQueue();
})();
</script>
</body>
</html>
