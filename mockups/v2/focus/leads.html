<!DOCTYPE html>
<html lang="en" data-theme="observatory" data-mode="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Radar — Leads · Focus</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../assets/tokens.css" />
<link rel="stylesheet" href="../../assets/base.css" />
<link rel="stylesheet" href="../../assets/components.css" />
<link rel="stylesheet" href="../assets/v2.css" />
<link rel="stylesheet" href="../assets/focus.css" />
<style>
  .focus-brief .does { color: var(--text-muted); font-size: var(--text-lg); margin-top: var(--space-2); }
  .focus-brief .meta { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-top: var(--space-4); font-size: var(--text-sm); align-items: center; }
  .focus-head { display: flex; gap: var(--space-5); align-items: flex-start; }
  .focus-head .score { flex: none; }
</style>
</head>
<body data-dir="focus" data-screen="leads" data-title="Leads · triage one at a time">
<div class="v2-app">
  <div class="v2-main">
    <main class="v2-content">
      <section class="focus-brief" id="focus" aria-live="polite"></section>
    </main>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<aside class="focus-drawer" id="drawer" aria-label="Lead queue">
  <div class="dh"><strong>Triage queue</strong><button class="btn-quiet" id="drawer-close">Close</button></div>
  <div class="filters" id="dfilters" style="padding:var(--space-3) var(--space-5)"></div>
  <div class="dl" id="drawer-list"></div>
</aside>

<script src="../../assets/data.js"></script>
<script src="../../assets/ui.js"></script>
<script src="../assets/motion.js"></script>
<script src="../assets/wayfinding.js"></script>
<script src="../assets/nav.js"></script>
<script>
(function () {
  const R = window.RADAR;
  const vname = (id) => (R.vendors.find((v) => v.vendor_id === id) || {}).name || id;
  const vshort = (id) => (R.vendors.find((v) => v.vendor_id === id) || {}).short || "";
  let vendor = "all", idx = 0;
  const all = R.leads.slice().sort((a, b) => b.score - a.score);
  const list = () => all.filter((l) => vendor === "all" || l.vendor_id === vendor);

  function proofLine(p) {
    const sig=R.signalById(p.sig)||{}; const v=R.freshness(p.date, sig.freshness_window||180);
    return `<div class="proof"><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg></span><div><div class="claim">${p.claim}</div><div class="receipt" data-fresh="${v}"><span class="mono">${R.fmtDate(p.date)}</span><span class="dot">·</span><span class="ago">${R.ago(p.date)}</span><span class="dot">·</span><span class="src">${p.source}</span><span class="dot">·</span><span class="mono faint">${p.sig}</span>${p.evidence?`<span class="dot">·</span><a href="${p.evidence}">evidence</a>`:""}</div></div></div>`;
  }
  function contacts(l) {
    if (!l.contacts||!l.contacts.length) return `<div class="empty" style="padding:var(--space-6)"><h3>Contacts pending enrichment</h3><p>Decision-makers haven't been resolved yet.</p></div>`;
    return l.contacts.map((dm)=>{ const w=dm.warm||{status:"cold"};
      const paths=dm.paths.map((p)=>!p.val?`<div class="path missing"><span class="type">${p.type}</span><span class="val">not found</span><span class="needs">needs enrichment</span></div>`:`<div class="path"><span class="type">${p.type}</span><span class="val">${p.val}</span><span class="conf">${p.conf}${p.source?" · "+p.source:""}</span></div>`).join("");
      const warm=w.status==="warm"?`<div class="warm-path"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.35-9.5-8.5A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6.5C19 16.65 12 21 12 21z"/></svg> Warm path · ${w.detail}</div>`:`<div class="warm-path cold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.35-9.5-8.5A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6.5C19 16.65 12 21 12 21z"/></svg> No warm path yet — cold outreach</div>`;
      return `<div class="dm"><div class="dm-head"><span class="dm-name">${dm.name}</span><span class="dm-role">${dm.role}</span></div><div class="why">${dm.why}</div><div class="paths">${paths}</div>${warm}</div>`;
    }).join("");
  }

  function render() {
    const ls = list(); if (idx >= ls.length) idx = 0; if (idx < 0) idx = ls.length - 1;
    const l = ls[idx]; const focus = document.getElementById("focus");
    if (!l) { focus.innerHTML = `<div class="empty"><h3>No leads match</h3><p>Open the queue and clear the filter.</p></div>`; return; }
    const on = l.outreach === "handed_to_vendor";
    const next = ls[(idx + 1) % ls.length];
    const dots = ls.map((_, i) => `<span class="step-dot ${i===idx?"on":""}"></span>`).join("");
    focus.innerHTML = `
      <div class="focus-step">
        <button class="focus-drawer-btn" id="open-drawer"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg> Queue · ${ls.length}</button>
        <div class="steps">${dots}</div>
        <div class="row" style="gap:var(--space-2)"><span class="counter">lead ${idx+1} / ${ls.length}</span>
          <button class="focus-nav-btn" id="prev" ${idx===0?"disabled":""}>‹</button>
          <button class="focus-nav-btn" id="next">›</button></div>
      </div>
      <div class="focus-head">
        <div style="flex:1"><div class="mono faint" style="font-size:var(--text-2xs)">${l.lead_id}</div>
          <div class="co"><h2>${l.company}</h2></div><div class="does">${l.does} · ${l.geo}</div>
          <div class="meta"><span>for <b>${vname(l.vendor_id)}</b></span><span class="faint">·</span><span class="stage" data-stage="${l.stage}"><span>${l.stage}</span></span><span class="faint">·</span>
            <span class="check-pass" style="font-size:var(--text-xs)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> disqualifier check passed</span></div></div>
        <span class="score" data-heat="${l.heat}" data-score="${l.score}"><span class="ring"><span data-count="${l.score}">0</span></span><span class="col"><span class="num count" data-count="${l.score}">0</span><span class="heat-label">${l.heat}</span></span></span>
      </div>
      <div class="brief-block reveal"><h3>Why them</h3><p>${l.why_them||l.intent}</p></div>
      <div class="brief-block reveal"><h3>Why now <span class="eyebrow" style="font-weight:400">dated, sourced proof</span></h3>${(l.why_now||[]).map(proofLine).join("")}</div>
      ${l.what_they_need?`<div class="brief-block reveal"><h3>What they need</h3><p>${l.what_they_need}</p></div>`:""}
      ${l.hook?`<div class="brief-block reveal"><h3>The hook <span class="draft-flag">suggested draft</span></h3><div class="hook">${l.hook}</div></div>`:""}
      ${l.why_this_vendor?`<div class="brief-block reveal"><h3>Why this vendor</h3><p>${l.why_this_vendor}</p></div>`:""}
      ${(l.objections&&l.objections.length)?`<div class="brief-block reveal"><h3>What to watch for</h3>${l.objections.map((o)=>`<div class="objection"><div class="o">${o.o}</div><div class="c">${o.c}</div></div>`).join("")}</div>`:""}
      <div class="brief-block reveal"><h3>Contacts</h3>${contacts(l)}</div>
      <div class="brief-block reveal" style="border:0"><div class="brief-controls">
        <div class="toggle" role="switch" aria-checked="${on}" tabindex="0" data-toggle data-on="Handed to vendor" data-off="Operator handles" data-toast-on="Outreach handed to vendor" data-toast-off="Operator handles outreach"><span class="switch"></span><span class="labels"><span class="state">${on?"Handed to vendor":"Operator handles"}</span><span class="desc">outreach mode</span></span></div>
        <button class="btn btn-primary" id="advance">Advance stage →</button><button class="btn btn-ghost">Copy brief</button></div></div>
      <div class="focus-next">
        <div><div class="nxt-label">next ·</div><div class="nxt-co">${next.company} <span class="faint" style="font-weight:400">(${next.score})</span></div></div>
        <button class="go" id="gonext">Open next lead <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      </div>`;
    if (window.radarPaintScores) radarPaintScores(focus);
    if (window.radarWire) radarWire(focus);
    if (window.radarMotion) { radarMotion.wireReveals(focus); radarMotion.countUp(focus); }
    document.getElementById("prev").addEventListener("click", () => { idx--; render(); });
    document.getElementById("next").addEventListener("click", () => { idx++; render(); });
    document.getElementById("gonext").addEventListener("click", () => { idx++; render(); window.scrollTo({ top: 0, behavior: "smooth" }); });
    document.getElementById("open-drawer").addEventListener("click", openDrawer);
    const adv = document.getElementById("advance");
    if (adv) adv.addEventListener("click", () => { const o=R.stages,i=o.indexOf(l.stage); if(i<0||i>=4){radarToast("Past triage stages");return;} l.stage=o[i+1]; radarToast(`Advanced to ${l.stage}`); render(); });
  }

  // queue drawer
  function renderDrawer() {
    const ls = list();
    document.getElementById("drawer-list").innerHTML = ls.map((l, i) => `
      <button class="focus-qrow" data-i="${i}" aria-selected="${i===idx}">
        <div><div style="font-weight:var(--weight-semibold);font-size:var(--text-sm)">${l.company}</div>
          <div class="faint" style="font-size:var(--text-xs)">${vshort(l.vendor_id)} · ${l.stage}</div></div>
        <span class="score-pill" data-heat="${l.heat}">${l.score}</span></button>`).join("");
    document.querySelectorAll(".focus-qrow").forEach((r)=>r.addEventListener("click",()=>{ idx=+r.dataset.i; closeDrawer(); render(); }));
    const vendors=[["all","All vendors"]].concat(R.vendors.map((v)=>[v.vendor_id,v.short]));
    document.getElementById("dfilters").innerHTML = `<span class="fchip-label">Vendor</span>`+vendors.map(([val,txt])=>`<button class="fchip" data-dv="${val}" aria-pressed="${vendor===val}">${txt}</button>`).join("");
    document.querySelectorAll("[data-dv]").forEach((b)=>b.addEventListener("click",()=>{ vendor=b.dataset.dv; idx=0; renderDrawer(); render(); }));
  }
  function openDrawer(){ renderDrawer(); document.getElementById("drawer").dataset.open="true"; document.getElementById("scrim").dataset.open="true"; }
  function closeDrawer(){ document.getElementById("drawer").dataset.open="false"; document.getElementById("scrim").dataset.open="false"; }
  document.getElementById("drawer-close").addEventListener("click", closeDrawer);
  document.getElementById("scrim").addEventListener("click", closeDrawer);

  render();
})();
</script>
</body>
</html>
